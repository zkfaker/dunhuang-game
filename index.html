<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莫高窟257窟数字密室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls, model;

        // 1. 场景初始化
        const canvas = document.getElementById('canvas');
        scene = new THREE.Scene();

        // 2. 相机（用你之前的位置）
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(-89.0, -3.0, -24.6);

        // 3. 渲染器
        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;

        // 4. 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x222222, 1.8);
        scene.add(hemisphereLight);

        // 5. 控制器（保留正面视角）
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = Math.PI - 0.3;
        
        // 【保留你找到的正面目标点】
        controls.target.set(-60, -2.8, -24.4);

        // 6. 加载模型
        const loader = new GLTFLoader();
        loader.load(
            './models/dunhuang.glb',
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                model.position.set(0, 0, 0);
                model.rotation.set(0, 0, 0);
                console.log('✅ 模型加载成功！');
            },
            (xhr) => console.log(`📦 加载进度：${(xhr.loaded / xhr.total * 100)}%`),
            (error) => console.error('❌ 模型加载失败：', error)
        );

        // 7. 屏幕适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 8. 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        console.log('✅ 代码执行完成！');
    </script>
</body>
</html>
